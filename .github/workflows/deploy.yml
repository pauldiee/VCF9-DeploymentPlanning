name: Deploy site to GitHub Pages

# Manual-only: the Pages site is offline by default (issue #135).
# To preview: enable Pages (gh api -X POST repos/pauldiee/VCF9-DeploymentPlanning/pages -f build_type=workflow),
# then run this workflow (gh workflow run deploy.yml). Disable Pages again when done
# (gh api -X DELETE repos/pauldiee/VCF9-DeploymentPlanning/pages).
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Install, build, upload
        uses: withastro/action@v3
        with:
          path: web
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
