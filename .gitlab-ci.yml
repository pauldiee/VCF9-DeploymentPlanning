# GitLab CI/CD — publishes the ITQ-branded Astro site to GitLab Pages for
# internal visibility, mirroring what .github/workflows/deploy.yml does for
# GitHub Pages. The two are independent: GitHub Actions runs on GitHub, this
# runs on the ITQ GitLab. The project's Pages URL appears under Deploy → Pages
# after the job runs (newer GitLab; older versions had it under Settings → Pages).
#
# The ITQ runner is a *shell* executor (no container), so `image:` is ignored and
# Node is not present on the host. The job therefore fetches a local Node build
# itself (cached between runs). If a Docker-executor runner picks the job up
# instead, `image:` provides Node and the download is skipped.
#
# The Astro `base` (URL path prefix) and `site` origin are derived at run time
# from CI_PAGES_URL, so they always match where GitLab actually serves the site —
# including a unique-domain path suffix like /<project>-<hash>.

stages:
  - deploy

pages:
  stage: deploy
  image: node:20
  variables:
    NODE_VERSION: "20.17.0"
  cache:
    key: "node-$NODE_VERSION"
    paths:
      - .cache-node/
  script:
    # Shell-executor runners have no Node; fetch a local copy once (cached).
    - |
      if ! command -v node >/dev/null 2>&1; then
        if [ ! -x ".cache-node/bin/node" ]; then
          url="https://nodejs.org/dist/v${NODE_VERSION}/node-v${NODE_VERSION}-linux-x64.tar.gz"
          mkdir -p .cache-node
          (command -v curl >/dev/null 2>&1 && curl -fsSL "$url" -o /tmp/node.tgz) || wget -qO /tmp/node.tgz "$url"
          tar -xzf /tmp/node.tgz -C .cache-node --strip-components=1
        fi
        export PATH="$PWD/.cache-node/bin:$PATH"
      fi
    - node --version && npm --version
    # Derive Astro base + origin from the ACTUAL Pages URL so paths match where
    # GitLab serves the site (incl. its unique-domain suffix, /<project>-<hash>).
    - export SITE_URL="$(node -e "try{console.log(new URL(process.env.CI_PAGES_URL).origin)}catch(e){console.log('')}")"
    - export SITE_BASE="$(node -e 'try{var p=new URL(process.env.CI_PAGES_URL).pathname.replace(/\/+$/,"");console.log(p||"/")}catch(e){console.log("/")}')"
    - echo "Building with SITE_URL=$SITE_URL SITE_BASE=$SITE_BASE"
    - cd web
    - npm ci
    - npm run build
    - cd ..
    - rm -rf public
    - mv web/dist public
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      changes:
        - web/**/*
        - docs/**/*
        - .gitlab-ci.yml
